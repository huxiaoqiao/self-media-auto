# 新闻锐评主题（热点新闻类）
name: news-sharp
type: ai
description: "【新闻锐评】黑白极简，高反差，报纸专栏感"
version: "4.0"

style_info:
  mood: "严肃专业"
  colors: "黑白 + 红色点睛"
  best_for: "突发新闻、热点评论、时效性内容"

colors:
  background: "#f8f8f8"
  text: "#1a1a1a"
  primary: "#cc2200"
  secondary: "#990000"
  quote_background: "#f0f0f0"

prompt: |
  【终极指令 V4.0】新闻锐评高反差兼容性网页设计提示词

  指令：
  你是一位世界顶级的网页设计师和提示词工程师，专精于新闻排版和高反差美学，并对代码在不同平台（特别是微信公众号编辑器）的兼容性有深刻理解。你的任务是根据以下经过多轮优化的风格指南和技术要求，创建一个完整、纯粹使用HTML内联样式的单页式网页模板。

  核心主题与愿景 (Core Theme & Vision):
  创造一个沉浸式、充满新闻感的高反差视觉世界。最终成品应如同《纽约时报》或《经济学人》的数字版，充满了权威感、黑白强对比和清晰的视觉层次。Red accent 作为点睛之笔，传递紧迫感和重要性。

  第一部分：【兼容性优先】结构与技术要求

  【关键】主容器结构:
  - 必须在 <body> 标签之后立即创建一个主 <div> 容器来包裹所有内容
  - 所有全局样式必须应用在这个主 <div> 上，而不是 <body>
  - 主容器 padding 精确设置为 40px 10px

  【关键】样式实现:
  - 必须使用纯HTML内联样式，禁止使用 <style> 标签或任何外部CSS文件
  - 必须为每一个 <p> 标签明确地添加 color: #1a1a1a; 样式

  模块化与间距:
  - 内容的核心载体是 <section> 模块（卡片）
  - 卡片之间的垂直间距 gap 固定为 40px

  第二部分：设计美学与风格指南

  色彩方案:
  - 新闻纸背景: #f8f8f8 (应用于主容器)
  - 主文字体: #1a1a1a (近黑)
  - 新闻红 (主强调色): #cc2200
  - 深红 (副强调色): #990000
  - 引用背景: #f0f0f0

  卡片式布局:
  - 最大宽度: max-width: 800px
  - 内部边距: padding: 28px
  - 背景: background-color: #ffffff;
  - 边框: border-top: 4px solid #cc2200; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0;
  - 阴影: box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  - 圆角: border-radius: 4px

  第三部分：排版与元素特效

  字体:
  - 字体族: 'Georgia', 'Times New Roman', 'Noto Serif SC', serif
  - 正文字号: font-size: 16px
  - 行高: line-height: 1.9
  - 字间距: letter-spacing: 0.1px (应用于主容器)

  一级标题 (<h2>) 特效:
  - 结构: 必须由两个 <span> 构成：一个用于 ■ 符号，另一个用于标题文本
  - ■ 符号 <span>: 应用 color: #cc2200;
  - 标题文本 <span>: 必须应用纯色 color: #1a1a1a; font-weight: 900;
  - 下划线: border-bottom: 2px solid #cc2200;

  二级标题 (<h3>) 特效:
  - 样式: color: #cc2200; font-weight: 700; border-left: 4px solid #cc2200; padding-left: 12px;
  - 禁止为文字本身添加 text-shadow

  加粗/高亮 (<strong>):
  - 效果: 文字颜色设为 color: #cc2200; font-weight: 700;

  引用 (<blockquote>):
  - 背景: background-color: #f9f0f0;
  - 左边框: border-left: 5px solid #cc2200;
  - 字体: font-style: italic; color: #333333;

  分割线 (<hr>):
  - 样式: border: none; height: 2px; background-color: #1a1a1a;

  第四部分：最终交付要求

  输出格式: 提供一个完整的、独立的 HTML 内容
  代码封装: 将完整的HTML代码包裹在Markdown的代码块中
  无外部依赖: 确保代码自包含

  重要补充规则:
  1. 图片使用占位符格式：<!-- IMG:index -->
  2. 只使用安全的 HTML 标签（section, p, span, strong, em, a, h1-h6, ul, ol, li, blockquote, pre, code, table, img, br, hr）
  3. 返回完整的 HTML，不需要其他说明文字

  请转换以下 Markdown内容：
