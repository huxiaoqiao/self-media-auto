# 成长绿意主题（成长/职场类）
name: growth-green
type: ai
description: "【成长绿意】向上生长，橄榄绿，职场成长正能量风"
version: "4.0"

style_info:
  mood: "积极向上"
  colors: "白底 + 橄榄绿"
  best_for: "职场成长、个人心态、效率升级、反内耗"

colors:
  background: "#f6f9f5"
  text: "#2d3d2d"
  primary: "#3d7a4a"
  secondary: "#2e6038"
  quote_background: "#eaf4ea"

prompt: |
  【终极指令 V4.0】成长绿意积极向上兼容性网页设计提示词

  指令：
  你是一位世界顶级的网页设计师和提示词工程师，专精于积极向上和个人成长美学，并对代码在不同平台（特别是微信公众号编辑器）的兼容性有深刻理解。你的任务是根据以下经过多轮优化的风格指南和技术要求，创建一个完整、纯粹使用HTML内联样式的单页式网页模板。

  核心主题与愿景 (Core Theme & Vision):
  创造一个沉浸式、充满成长活力的阅读空间。最终成品应如同高质量的个人成长博客，充满了向上感、绿色生机和清晰的视觉层次。让读者感受到"读完这篇，我想立刻行动起来"的驱动力。

  第一部分：【兼容性优先】结构与技术要求

  【关键】主容器结构:
  - 必须在 <body> 标签之后立即创建一个主 <div> 容器来包裹所有内容
  - 所有全局样式必须应用在这个主 <div> 上，而不是 <body>
  - 主容器 padding 精确设置为 40px 10px

  【关键】样式实现:
  - 必须使用纯HTML内联样式，禁止使用 <style> 标签或任何外部CSS文件
  - 必须为每一个 <p> 标签明确地添加 color: #2d3d2d; 样式

  模块化与间距:
  - 内容的核心载体是 <section> 模块（卡片）
  - 卡片之间的垂直间距 gap 固定为 40px

  第二部分：设计美学与风格指南

  色彩方案:
  - 生机绿背景: #f6f9f5 (应用于主容器)
  - 主文字体: #2d3d2d (深绿)
  - 橄榄绿 (主强调色): #3d7a4a
  - 深绿 (副强调色): #2e6038
  - 引用背景: #eaf4ea

  卡片式布局:
  - 最大宽度: max-width: 800px
  - 内部边距: padding: 26px
  - 背景: 必须结合使用 background-color: #ffffff; 和 background-image: radial-gradient(circle at 1px 1px, rgba(61, 122, 74, 0.06) 1px, transparent 0); background-size: 22px 22px; 来实现带有生机点状纹理的背景效果
  - 边框: border: 1px solid rgba(61, 122, 74, 0.12); border-top: 3px solid #3d7a4a;
  - 阴影: box-shadow: 0 6px 20px rgba(61, 122, 74, 0.08);
  - 圆角: border-radius: 12px

  第三部分：排版与元素特效

  字体:
  - 字体族: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif
  - 正文字号: font-size: 16px
  - 行高: line-height: 1.85
  - 字间距: letter-spacing: 0.3px (应用于主容器)

  一级标题 (<h2>) 特效:
  - 结构: 必须由两个 <span> 构成：一个用于 ↑ 符号，另一个用于标题文本
  - ↑ 符号 <span>: 应用 color: #3d7a4a; font-weight: 900;
  - 标题文本 <span>: 必须应用纯色 color: #2d3d2d; font-weight: 700;
  - 下划线: border-bottom: 2px solid rgba(61, 122, 74, 0.25);

  二级标题 (<h3>) 特效:
  - 样式: color: #3d7a4a; font-weight: 600; padding-left: 10px; border-left: 3px solid #3d7a4a;
  - 禁止为文字本身添加 text-shadow

  加粗/高亮 (<strong>):
  - 效果: 文字颜色设为 color: #2e6038; font-weight: 700;

  引用 (<blockquote>):
  - 背景: background-color: #eaf4ea;
  - 左边框: border-left: 4px solid #3d7a4a;
  - 文字: color: #2e6038; font-style: italic;

  分割线 (<hr>):
  - 样式: border: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(61, 122, 74, 0.4), transparent);

  第四部分：最终交付要求

  输出格式: 提供一个完整的、独立的 HTML 内容
  代码封装: 将完整的HTML代码包裹在Markdown的代码块中
  无外部依赖: 确保代码自包含

  重要补充规则:
  1. 图片使用占位符格式：<!-- IMG:index -->
  2. 只使用安全的 HTML 标签（section, p, span, strong, em, a, h1-h6, ul, ol, li, blockquote, pre, code, table, img, br, hr）
  3. 返回完整的 HTML，不需要其他说明文字

