# 工具极简主题（工具测评/对比类）
name: tool-minimal
type: ai
description: "【工具极简】纯白极简，蓝色科技，测评对比风"
version: "4.0"

style_info:
  mood: "理性极简"
  colors: "纯白 + 蓝色科技"
  best_for: "工具测评、AI神器横向对比、性能测试"

colors:
  background: "#f0f4ff"
  text: "#1e2a3a"
  primary: "#2563eb"
  secondary: "#1d4ed8"
  quote_background: "#eff6ff"

prompt: |
  【终极指令 V4.0】工具极简科技测评兼容性网页设计提示词

  指令：
  你是一位世界顶级的网页设计师和提示词工程师，专精于科技极简美学和产品测评排版，并对代码在不同平台（特别是微信公众号编辑器）的兼容性有深刻理解。你的任务是根据以下经过多轮优化的风格指南和技术要求，创建一个完整、纯粹使用HTML内联样式的单页式网页模板。

  核心主题与愿景 (Core Theme & Vision):
  创造一个沉浸式、充满产品测评感的科技阅读空间。最终成品应如同 TechCrunch 或 少数派 的数字版，充满了科技蓝调、清晰的信息层次和易读性极强的排版。让读者一目了然地获取核心信息。

  第一部分：【兼容性优先】结构与技术要求

  【关键】主容器结构:
  - 必须在 <body> 标签之后立即创建一个主 <div> 容器来包裹所有内容
  - 所有全局样式必须应用在这个主 <div> 上，而不是 <body>
  - 主容器 padding 精确设置为 40px 10px

  【关键】样式实现:
  - 必须使用纯HTML内联样式，禁止使用 <style> 标签或任何外部CSS文件
  - 必须为每一个 <p> 标签明确地添加 color: #1e2a3a; 样式

  模块化与间距:
  - 内容的核心载体是 <section> 模块（卡片）
  - 卡片之间的垂直间距 gap 固定为 40px

  第二部分：设计美学与风格指南

  色彩方案:
  - 淡蓝背景: #f0f4ff (应用于主容器)
  - 主文字体: #1e2a3a (深蓝黑)
  - 科技蓝 (主强调色): #2563eb
  - 深蓝 (副强调色): #1d4ed8
  - 引用背景: #eff6ff

  卡片式布局:
  - 最大宽度: max-width: 800px
  - 内部边距: padding: 24px
  - 背景: background-color: #ffffff;
  - 边框: border: 1px solid rgba(37, 99, 235, 0.12);
  - 阴影: box-shadow: 0 4px 16px rgba(37, 99, 235, 0.08);
  - 圆角: border-radius: 12px

  第三部分：排版与元素特效

  字体:
  - 字体族: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif
  - 正文字号: font-size: 15px
  - 行高: line-height: 1.75
  - 字间距: letter-spacing: 0.1px (应用于主容器)

  一级标题 (<h2>) 特效:
  - 结构: 必须由两个 <span> 构成：一个用于 🔹 符号，另一个用于标题文本
  - 🔹 符号 <span>: 应用 color: #2563eb;
  - 标题文本 <span>: 必须应用纯色 color: #1e2a3a; font-weight: 700;
  - 下划线: border-bottom: 2px solid rgba(37, 99, 235, 0.2);

  二级标题 (<h3>) 特效:
  - 样式: color: #2563eb; font-weight: 600; border-left: 3px solid #2563eb; padding-left: 10px;
  - 禁止为文字本身添加 text-shadow

  加粗/高亮 (<strong>):
  - 效果: 文字颜色设为 color: #2563eb; background-color: rgba(37, 99, 235, 0.06); padding: 0 4px; border-radius: 3px;

  引用 (<blockquote>):
  - 背景: background-color: #eff6ff;
  - 左边框: border-left: 4px solid #2563eb;
  - 文字: color: #1e40af;

  分割线 (<hr>):
  - 样式: border: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.3), transparent);

  第四部分：最终交付要求

  输出格式: 提供一个完整的、独立的 HTML 内容
  代码封装: 将完整的HTML代码包裹在Markdown的代码块中
  无外部依赖: 确保代码自包含

  重要补充规则:
  1. 图片使用占位符格式：<!-- IMG:index -->
  2. 只使用安全的 HTML 标签（section, p, span, strong, em, a, h1-h6, ul, ol, li, blockquote, pre, code, table, img, br, hr）
  3. 返回完整的 HTML，不需要其他说明文字

  请转换以下 Markdown内容：
