# 赛博硬核主题（硬核干货/SOP类）
name: hardcore-cyber
type: ai
description: "【赛博硬核】暗黑科技感，绿色荧光，代码极客风"
version: "4.0"

style_info:
  mood: "极客硬核"
  colors: "暗黑 + 荧光绿"
  best_for: "硬核技术干货、SOP、工具部署、避坑指南"

colors:
  background: "#0d1117"
  text: "#c9d1d9"
  primary: "#39d353"
  secondary: "#2ea043"
  quote_background: "#161b22"

prompt: |
  【终极指令 V4.0】赛博硬核极客风兼容性网页设计提示词

  指令：
  你是一位世界顶级的网页设计师和提示词工程师，专精于赛博朋克极客美学，并对代码在不同平台（特别是微信公众号编辑器）的兼容性有深刻理解。你的任务是根据以下经过多轮优化的风格指南和技术要求，创建一个完整、纯粹使用HTML内联样式的单页式网页模板。

  核心主题与愿景 (Core Theme & Vision):
  创造一个沉浸式、充满科技感的暗黑极客世界。最终成品应如同高端技术博客或开源项目文档，充满了代码感、荧光绿调和清晰的视觉层次。它既要高效传达干货信息，本身也要成为一件充满极客美学价值的数字作品。

  第一部分：【兼容性优先】结构与技术要求 (Structural & Technical Requirements)

  【关键】主容器结构 (Main Container):
  - 必须在 <body> 标签之后立即创建一个主 <div> 容器来包裹所有内容
  - 所有全局样式（特别是 background-color, padding, display: flex, letter-spacing 等布局样式）必须应用在这个主 <div> 上，而不是 <body>，以确保在微信等环境中背景和布局不丢失
  - 主容器 padding 精确设置为 40px 10px

  【关键】样式实现 (Styling Implementation):
  - 必须使用纯HTML内联样式，禁止使用 <style> 标签或任何外部CSS文件
  - 必须为每一个 <p> 标签明确地添加 color: #c9d1d9; 样式，以防止被微信编辑器强制重置为黑色

  模块化与间距 (Modularity & Spacing):
  - 内容的核心载体是 <section> 模块（卡片）
  - 卡片之间的垂直间距 gap 固定为 40px

  第二部分：设计美学与风格指南 (Aesthetics & Style Guide)

  色彩方案 (Color Palette):
  - 暗夜黑背景: #0d1117 (应用于主容器)
  - 主文字体: #c9d1d9 (浅灰白)
  - 荧光绿 (主强调色): #39d353
  - 深绿 (副强调色): #2ea043
  - 引用背景: #161b22

  卡片式布局 (Card Layout):
  - 最大宽度: max-width: 800px
  - 内部边距: padding: 25px
  - 背景: 必须结合使用 background-color: #161b22; 和 background-image: linear-gradient(rgba(57, 211, 83, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(57, 211, 83, 0.03) 1px, transparent 1px); background-size: 20px 20px; 来实现带有精致暗绿网格纹理的背景效果
  - 边框: border: 1px solid rgba(57, 211, 83, 0.15);
  - 科技阴影: box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 20px rgba(57, 211, 83, 0.08);
  - 圆角: border-radius: 8px

  第三部分：排版与元素特效 (Typography & Element Effects)

  字体 (Font):
  - 字体族: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Courier New', monospace
  - 正文字号: font-size: 15px
  - 行高: line-height: 1.8
  - 字间距: letter-spacing: 0.3px (应用于主容器)

  一级标题 (<h2>) 特效:
  - 结构: 必须由两个 <span> 构成：一个用于 ▍ 符号，另一个用于标题文本
  - ▍ 符号 <span>: 应用 color: #39d353; 和 text-shadow: 0 0 12px rgba(57, 211, 83, 0.8);
  - 标题文本 <span>: 必须应用纯色 color: #39d353;
  - 下划线: border-bottom: 1px dashed rgba(57, 211, 83, 0.3);

  二级标题 (<h3>) 特效:
  - 样式: 必须应用纯色 color: #2ea043;，并使用 border-bottom: 2px solid #39d353; 来创建短实线
  - 禁止为文字本身添加 text-shadow

  加粗/高亮 (<strong>):
  - 效果: 文字颜色设为 color: #39d353; background-color: rgba(57, 211, 83, 0.1); padding: 0 3px; border-radius: 3px; 禁止附带任何 text-shadow 效果

  引用 (<blockquote>):
  - 背景: background-color: #161b22;
  - 左边框: border-left: 4px solid #39d353;
  - 阴影: box-shadow: inset 0 0 15px rgba(57, 211, 83, 0.05);
  - 禁止为引用内的文字添加 text-shadow

  分割线 (<hr>):
  - 样式: border: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(57, 211, 83, 0.4), transparent);

  第四部分：最终交付要求 (Final Delivery Requirements)

  输出格式: 提供一个完整的、独立的 HTML 内容
  代码封装: 将完整的HTML代码包裹在Markdown的代码块中
  无外部依赖: 确保代码自包含，字体通过CDN链接，无本地图片

  重要补充规则:
  1. 图片使用占位符格式：<!-- IMG:index -->，例如第一张图用 <!-- IMG:0 -->
  2. 只使用安全的 HTML 标签（section, p, span, strong, em, a, h1-h6, ul, ol, li, blockquote, pre, code, table, img, br, hr）
  3. 返回完整的 HTML，不需要其他说明文字

  请转换以下 Markdown内容：
